<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Londres — Jorge & familia</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#16284A;--navy-deep:#0E1B33;--cream:#FAF6ED;--gold:#E0B05C;--ink:#1C1E24;--muted:#8B93A6;--radius:14px;--accent:#4F8FC4;--ff:"Fraunces",serif;--fb:"Archivo",sans-serif;--fm:"IBM Plex Mono",monospace;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--navy-deep);}
body{color:var(--cream);font-family:var(--fb);-webkit-font-smoothing:antialiased;padding-bottom:2rem;max-width:560px;margin:0 auto;}
.top{padding:1.2rem 1.1rem .8rem;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);}
.eyebrow{font-family:var(--fm);font-size:.62rem;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;}
h1{font-family:var(--ff);font-weight:600;font-size:1.65rem;line-height:1.15;margin-top:.3rem;}
h1 span{color:var(--gold);font-style:italic;font-weight:500;}
.tabs{display:flex;gap:.4rem;padding:.65rem .9rem;overflow-x:auto;background:var(--navy);position:sticky;top:0;z-index:30;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;display:flex;align-items:center;gap:.35rem;padding:.45rem .75rem;border-radius:999px;border:1.5px solid var(--tab-color);background:transparent;color:var(--cream);font-family:var(--fb);font-weight:600;font-size:.78rem;cursor:pointer;}
.tab .num{width:1.2rem;height:1.2rem;border-radius:50%;background:var(--tab-color);color:var(--navy-deep);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.68rem;font-weight:700;}
.tab.active{background:var(--tab-color);color:var(--navy-deep);}
.tab.active .num{background:var(--navy-deep);color:var(--tab-color);}
.head{padding:.8rem 1.1rem 0;}
.head h2{font-family:var(--ff);font-weight:600;font-size:1.2rem;}
.head p{font-size:.78rem;color:var(--muted);margin-top:.12rem;}
.banner{margin:.65rem .9rem 0;padding:.6rem .85rem;background:var(--cream);color:var(--ink);border-radius:10px;border-left:4px solid var(--gold);font-size:.78rem;font-weight:600;line-height:1.35;}
#map{height:38vh;min-height:210px;margin:.75rem .9rem 0;border-radius:var(--radius);border:2px solid var(--accent);overflow:hidden;}
.schedule{padding:.9rem;display:flex;flex-direction:column;gap:.65rem;}
.stop{background:var(--cream);color:var(--ink);border-radius:var(--radius);padding:.8rem .9rem;display:grid;grid-template-columns:2rem 1fr;gap:.65rem;border-left:5px solid var(--accent);}
.stop .badge{width:2rem;height:2rem;border-radius:50%;background:var(--accent);color:var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:700;font-size:.8rem;flex-shrink:0;}
.stop .time{font-family:var(--fm);font-size:.72rem;color:var(--muted);letter-spacing:.04em;}
.stop h3{font-family:var(--ff);font-weight:600;font-size:.98rem;margin:.08rem 0 .12rem;}
.stop .addr{font-size:.72rem;color:var(--muted);margin-bottom:.28rem;}
.stop p.notes{font-size:.82rem;line-height:1.42;}
.stop .tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.4rem;}
.tag{font-family:var(--fm);font-size:.62rem;font-weight:600;padding:.18rem .5rem;border-radius:999px;letter-spacing:.04em;}
.tag-free{background:#D5F5E3;color:#1E8449;}
.tag-book{background:#D6EAF8;color:#1A5276;}
.tag-pay{background:#E8DAEF;color:#6C3483;}
.tag-eat{background:#FDEBD0;color:#A04000;}
.tag-sofia{background:#EBD5F5;color:#6C3483;}
.stop .btn-row{display:flex;gap:.65rem;align-items:center;margin-top:.55rem;}
.stop a.go{display:inline-flex;align-items:center;gap:.25rem;font-size:.76rem;font-weight:700;color:var(--navy);text-decoration:none;border-bottom:1.5px solid var(--gold);}
.stop.special{border-left-color:var(--gold);background:linear-gradient(135deg,var(--cream) 0%,#FFF6E0 100%);}
.stop.special .badge{background:var(--gold);color:var(--navy-deep);}
.lmarker{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fm);font-weight:700;font-size:.76rem;border:2px solid var(--cream);box-shadow:0 1px 4px rgba(0,0,0,.35);}
.lmarker.home{background:var(--cream);color:var(--navy);border-color:var(--gold);font-size:.95rem;}
.leaflet-popup-content{font-family:var(--fb);font-size:.8rem;line-height:1.4;}
.leaflet-popup-content a{color:var(--navy);font-weight:700;}
footer{padding:1.2rem 1.1rem .4rem;text-align:center;font-family:var(--fm);font-size:.65rem;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
<header class="top">
  <p class="eyebrow">15&mdash;18 JUL 2025 &middot; BASE: MARLOW HOUSE, PADDINGTON W2</p>
  <h1>Londres<br><span>Jorge & familia</span></h1>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="head" id="head"></div>
<div class="banner" id="banner"></div>
<div id="map"></div>
<main class="schedule" id="schedule"></main>
<footer>🧭 "Desde..." abre Google Maps con ruta caminando desde la parada anterior &middot; ✏️ = nota de Sofía</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js" crossorigin=""></script>
<script>
const HOME={lat:51.5177,lng:-0.1762,name:"Marlow House — Paddington W2"};

const DAYS=[
  {
    id:1, date:"Mié 15/7", title:"Paddington → Notting Hill", subtitle:"Hyde Park · Portobello · Little Venice",
    color:"#4F8FC4",
    banner:"🚲 Día que empieza caminando desde el hotel. Alquilar bicicletas Santander Cycles en Hyde Park. Las fotos bonitas de Notting Hill NO están todas juntas — hay que caminar el barrio.",
    stops:[
      {time:"8:30",  title:"Desayuno — GAIL's Bakery Paddington Square", address:"Paddington Square, London W2", notes:"Sofía recomienda: ideal para comprar algo para llevar y comer en Hyde Park. Alternativa: Venice London (algo más británico y sentado).", lat:51.5163, lng:-0.1762, tags:["eat","sofia"]},
      {time:"9:15",  title:"Hyde Park — Serpentine Lake", address:"Hyde Park, London W2", notes:"10 min caminando del hotel. Alquilar bicicletas Santander Cycles. Recorrer el lago Serpentine, Italian Gardens y la zona de Kensington Gardens.", lat:51.5073, lng:-0.1641, tags:["free"]},
      {time:"10:30", title:"Kensington Gardens + Peter Pan statue", address:"Kensington Gardens, London W8", notes:"Continuación natural desde Hyde Park en bici o caminando. La estatua de Peter Pan y los jardines reales. Kensington Palace está a la vista (cerrado lunes).", lat:51.5075, lng:-0.1828, tags:["free"]},
      {time:"11:30", title:"Notting Hill — Calles del barrio", address:"Notting Hill, London W11", notes:"✏️ Sofía: caminar Lancaster Road (colorida), Westbourne Park Road (elegante) y Elgin Crescent (película londinense). Las fotos famosas NO están en un solo punto — hay que recorrer el barrio.", lat:51.5160, lng:-0.2090, tags:["sofia"]},
      {time:"13:00", title:"Portobello Road Market", address:"Portobello Rd, London W11", notes:"El sábado 18/7 es el mejor día para el mercado lleno, pero los miércoles también hay puestos. Recuerdos, antigüedades, ropa, comida y ambiente callejero. En familia funciona muy bien.", lat:51.5147, lng:-0.2059, tags:[]},
      {time:"14:30", title:"Almuerzo — Farm Girl Notting Hill", address:"59A Portobello Rd, London W11 3DB", notes:"✏️ Sofía recomienda. Brunch / café muy lindo en el barrio. Alternativas: Eggslut (rápido) o Dishoom (especial, requiere reserva previa).", lat:51.5148, lng:-0.2011, tags:["eat","sofia"]},
      {time:"16:00", title:"OPCIÓN: Oxford Street / Soho", address:"Oxford Circus, London W1", notes:"Metro desde Notting Hill Gate → Oxford Circus (Central Line, 4 paradas). Oxford Street + Soho: más movimiento, tiendas, ciudad grande. Opcional según energía del grupo.", lat:51.5152, lng:-0.1415, tags:[]},
      {time:"19:30", title:"Little Venice (cierre del día)", address:"Blomfield Rd, London W9", notes:"10 min caminando del hotel hacia el norte. Canal con barcas de colores, muy pintoresco. Perfecto para el cierre tranquilo del primer día.", lat:51.5228, lng:-0.1837, tags:["free"]}
    ]
  },
  {
    id:2, date:"Jue 16/7", title:"Londres Icónico", subtitle:"Westminster · Buckingham · South Bank · Covent Garden",
    color:"#E07B54",
    banner:"👑 Salir a las 9:30 desde Paddington. Llegar a Buckingham antes de las 11:00 para agarrar buen lugar en el Cambio de Guardia. St James's Park en el medio corta el caos turístico.",
    stops:[
      {time:"9:30",  title:"Metro a Westminster", address:"Paddington Station → Westminster", notes:"Circle Line o District Line desde Paddington hasta Westminster Station. 15 minutos.", lat:51.5007, lng:-0.1246, tags:[]},
      {time:"10:00", title:"Big Ben + Palace of Westminster", address:"Westminster Bridge Rd, London SW1A", notes:"Foto perfecta desde la orilla del Támesis con el puente en primer plano. Recorrer la plaza, el puente, los alrededores. 30-50 min.", lat:51.5007, lng:-0.1246, tags:["free"]},
      {time:"10:50", title:"Westminster Abbey", address:"Dean's Yard, London SW1P 3PA", notes:"A pasos del Parlamento. Ver desde afuera: gratis y vale la foto. Entrar: ~£27/adulto. Decidir según interés del grupo.", lat:51.4994, lng:-0.1273, tags:["pay"]},
      {time:"11:30", title:"St James's Park", address:"St James's Park, London SW1A", notes:"✏️ Sofía: ESTE PARQUE ES CLAVE. 10 min caminando desde Westminster. Corta el caos turístico antes de Buckingham. El puente azul tiene vistas increíbles.", lat:51.5027, lng:-0.1340, tags:["free","sofia"]},
      {time:"12:00", title:"Cambio de Guardia — Buckingham Palace", address:"Buckingham Palace, London SW1A 1AA", notes:"OBLIGATORIO. Llegar 10-15 min antes para lugar. En julio hay mucha gente. Dura ~45 minutos. Empieza a las 11:00 — según el horario del día puede variar, verificar online.", lat:51.5014, lng:-0.1419, tags:["free"]},
      {time:"13:30", title:"Westminster Bridge → South Bank", address:"Westminster Bridge, London SE1", notes:"✏️ Sofía: 'acá empieza probablemente la mejor parte del día.' Cruzar el puente caminando. Vistas de Big Ben, Támesis y London Eye todo junto.", lat:51.5010, lng:-0.1195, tags:["sofia"]},
      {time:"14:00", title:"South Bank — Paseo ribereño", address:"South Bank, London SE1", notes:"2-3 horas muy tranquilas. Artistas callejeros, puestos, vistas al río, ambiente familiar. Almuerzo aquí. Wahaca Southbank (mexicana), Pizza Pilgrims o Pret A Manger para algo rápido.", lat:51.5065, lng:-0.1143, tags:["eat"]},
      {time:"16:30", title:"London Eye", address:"Riverside Building, County Hall, SE1 7PB", notes:"Sobre el South Bank, ya están a metros. RESERVAR online con anticipación para 5 personas. ~£26/adulto. Vistas de 360° desde 135m de altura.", lat:51.5032, lng:-0.1195, tags:["book"]},
      {time:"18:30", title:"Covent Garden", address:"Covent Garden, London WC2", notes:"Metro desde Waterloo o caminando 20 min. Covent Garden Market, Neal's Yard (patio de colores muy fotogénico), Seven Dials Sundial Pillar. Shows callejeros en julio.", lat:51.5117, lng:-0.1240, tags:[]},
      {time:"20:00", title:"Piccadilly Circus + vuelta", address:"Piccadilly Circus, London W1", notes:"De paso hacia el metro. Foto rápida y volver a Paddington. Metro desde Piccadilly Circus (Bakerloo Line directa a Paddington, 5 min).", lat:51.5098, lng:-0.1342, tags:[]}
    ]
  },
  {
    id:3, date:"Vie 17/7", title:"Támesis Este + Museos", subtitle:"Tower Bridge · Sky Garden · Borough Market · British Museum",
    color:"#4BAE8A",
    banner:"🌿 Sky Garden: GRATIS pero reservar en skygarden.london con 3-4 semanas de anticipación. Hoy viernes: British Museum y Tate Modern abren hasta las 20:30.",
    stops:[
      {time:"9:30",  title:"Metro a Tower Hill", address:"Paddington → Tower Hill", notes:"Circle Line desde Paddington hasta Tower Hill. 20 minutos.", lat:51.5097, lng:-0.0766, tags:[]},
      {time:"10:00", title:"Tower Bridge", address:"Tower Bridge Rd, London SE1 2UP", notes:"Ver desde afuera: gratis y espectacular. Si reservaron, subir a las pasarelas de vidrio (~£14/adulto). Abre 9:30h.", lat:51.5055, lng:-0.0754, tags:["book"]},
      {time:"11:00", title:"Sky Garden", address:"1 Sky Garden Walk, London EC3M 8AF", notes:"5 min caminando de Tower Bridge. Jardín en terraza del rascacielos más alto del barrio. Vistas panorámicas completas de Londres. GRATIS con reserva previa obligatoria en skygarden.london.", lat:51.5112, lng:-0.0835, tags:["free","book"]},
      {time:"13:00", title:"Borough Market", address:"8 Southwark St, London SE1 1TL", notes:"10 min caminando. Las frutillas con chocolate son el clásico del mercado. Fish & chips. Ambiente increíble. Cerrado los lunes. Abre hasta 17:00.", lat:51.5056, lng:-0.0905, tags:["eat"]},
      {time:"14:30", title:"Tate Modern", address:"Bankside, London SE1 9TG", notes:"A pasos del Borough Market. GRATIS. Colección permanente de arte moderno. Subir al piso 10 para vistas espectaculares sobre el Támesis y St. Paul's. Viernes abre hasta 21:00.", lat:51.5076, lng:-0.0994, tags:["free"]},
      {time:"16:00", title:"St Paul's Cathedral", address:"St. Paul's Churchyard, London EC4M 8AD", notes:"5 min caminando de Tate. Ver desde afuera: gratis y muy impresionante. Entrar: ~£25/adulto (incluye la galería del susurro y la cúpula).", lat:51.5138, lng:-0.0984, tags:["pay"]},
      {time:"17:00", title:"The British Museum", address:"Great Russell St, London WC1B 3DG", notes:"Metro a Holborn o Tottenham Court Road (15 min). GRATIS y obligatorio. Momias egipcias, Piedra de Roseta, reliquias de toda la historia humana. Hoy viernes abre hasta 20:30 — aprovechar.", lat:51.5194, lng:-0.1270, tags:["free"]},
      {time:"20:00", title:"Cena — China Town / Soho", address:"Chinatown, London W1D", notes:"De paso hacia el metro. China Town: muy buena comida y económica. Soho tiene opciones para todos los gustos. Ambiente nocturno muy animado en julio.", lat:51.5115, lng:-0.1313, tags:["eat"]}
    ]
  },
  {
    id:4, date:"Sáb 18/7", title:"Harrods · Camden · Battersea", subtitle:"Compras · Mercado alternativo · Pink Floyd",
    color:"#B79AD6",
    banner:"🛍️ Sábado: mejor día para Camden Town por la tarde (más movimiento) y para Portobello Road si quieren volver a Notting Hill. Battersea abre 10:00-20:00 los sábados.",
    stops:[
      {time:"10:00", title:"Harrods — Subsuelo de alimentos", address:"87-135 Brompton Rd, London SW1X 7XL", notes:"OBLIGATORIO el subsuelo de alimentos: una experiencia en sí misma, aunque no compren nada. Abre a las 10:00. El edificio iluminado por fuera también es espectacular.", lat:51.4994, lng:-0.1632, tags:[]},
      {time:"11:30", title:"Chelsea — Paseo por el barrio", address:"Chelsea, London SW3", notes:"Caminando desde Harrods. Barrio muy british, clase media acomodada. Bueno para caminar, tomar algo y ver el estilo de vida londinense.", lat:51.4882, lng:-0.1749, tags:[]},
      {time:"13:00", title:"Almuerzo en Chelsea / Knightsbridge", address:"Chelsea / Knightsbridge, London", notes:"La zona tiene muchos cafés y restaurantes de calidad. Buena opción para una comida tranquila antes del ritmo de Camden.", lat:51.4916, lng:-0.1647, tags:["eat"]},
      {time:"15:00", title:"Camden Town — Mercado", address:"Camden Lock Market, London NW1 8AF", notes:"Metro (Northern Line desde cualquier punto del centro). Ambiente alternativo único. Street food de todo el mundo. Sábado a la tarde es el momento de mayor movimiento y variedad.", lat:51.5412, lng:-0.1462, tags:[]},
      {time:"17:30", title:"Battersea Power Station", address:"Circus Rd W, Nine Elms, London SW11", notes:"La tapa del disco Animal de Pink Floyd. Metro Northern Line → Clapham North + bus, o Northern Line → Stockwell + Victoria Line → Vauxhall + 10 min bus. Shopping + restaurantes adentro. Impresionante por fuera.", lat:51.4820, lng:-0.1445, tags:[]},
      {time:"19:30", title:"Cena y vuelta a Paddington", address:"Paddington, London W2", notes:"Última noche en Londres. Cena en cualquier pub del camino de vuelta. El sistema de transporte de Londres funciona tarde — sin apuros para volver.", lat:51.5163, lng:-0.1762, tags:["eat"]}
    ]
  }
];

const TAG_HTML={
  free:'<span class="tag tag-free">GRATIS</span>',
  book:'<span class="tag tag-book">RESERVAR</span>',
  pay:'<span class="tag tag-pay">PAGO</span>',
  eat:'<span class="tag tag-eat">COMER</span>',
  sofia:'<span class="tag tag-sofia">✏️ SOFÍA</span>',
};

let map,layer;
function initMap(){
  map=L.map('map',{attributionControl:true}).setView([HOME.lat,HOME.lng],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);
  layer=L.layerGroup().addTo(map);
}
function pin(h){return L.divIcon({html:h,className:'',iconSize:[26,26],iconAnchor:[13,13]});}
function gmaps(fLat,fLng,tLat,tLng){
  return `https://www.google.com/maps/dir/?api=1&origin=${fLat},${fLng}&destination=${tLat},${tLng}&travelmode=walking`;
}

function renderDay(idx){
  const day=DAYS[idx];
  document.documentElement.style.setProperty('--accent',day.color);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('head').innerHTML=`<h2>${day.title}</h2>${day.subtitle?`<p>${day.subtitle}</p>`:''}`;
  document.getElementById('banner').innerHTML=day.banner;
  layer.clearLayers();
  const pts=[[HOME.lat,HOME.lng]];
  L.marker([HOME.lat,HOME.lng],{icon:pin('<div class="lmarker home">🏠</div>')})
    .addTo(layer).bindPopup(`<b>${HOME.name}</b>`);
  day.stops.forEach((s,i)=>{
    const m=L.marker([s.lat,s.lng],{icon:pin(`<div class="lmarker" style="background:${day.color}">${i+1}</div>`)}).addTo(layer);
    const prev0=i===0?HOME:day.stops[i-1];
    m.bindPopup(`<b>${s.time} · ${s.title.replace(/—/g,'–')}</b><br>${s.address}<br><a href="${gmaps(prev0.lat,prev0.lng,s.lat,s.lng)}" target="_blank">Cómo llegar →</a>`);
    pts.push([s.lat,s.lng]);
  });
  L.polyline(pts,{color:day.color,weight:3,dashArray:'6,8',opacity:.85}).addTo(layer);
  map.fitBounds(L.latLngBounds(pts),{padding:[26,26]});
  const sch=document.getElementById('schedule');
  sch.innerHTML='';
  day.stops.forEach((s,i)=>{
    const prev=i===0?HOME:day.stops[i-1];
    const prevName=i===0?'el hotel':'parada '+i;
    const el=document.createElement('div');
    el.className='stop'+(s.special?' special':'');
    const badge=document.createElement('div');
    badge.className='badge';
    badge.textContent=i+1;
    const tagsHtml=(s.tags||[]).map(t=>TAG_HTML[t]||'').join('');
    const col=document.createElement('div');
    col.innerHTML=`
      <div class="time">${s.time}</div>
      <h3>${s.title.replace(/—/g,'&mdash;')}</h3>
      <div class="addr">${s.address}</div>
      <p class="notes">${s.notes}</p>
      ${tagsHtml?`<div class="tags">${tagsHtml}</div>`:''}
      <div class="btn-row">
        <a class="go" href="${gmaps(prev.lat,prev.lng,s.lat,s.lng)}" target="_blank">🧭 Desde ${prevName}</a>
      </div>`;
    el.appendChild(badge);
    el.appendChild(col);
    sch.appendChild(el);
  });
}

function buildTabs(){
  const te=document.getElementById('tabs');
  DAYS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.style.setProperty('--tab-color',d.color);
    b.innerHTML=`<span class="num">${d.id}</span> ${d.date}`;
    b.addEventListener('click',()=>renderDay(i));
    te.appendChild(b);
  });
}

initMap();
buildTabs();
renderDay(0);
</script>
</body>
</html>
